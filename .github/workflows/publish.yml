name: Publish to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode GPG secret key
        run: |
          echo "${{ secrets.GPG_SECRET_KEY }}" | base64 --decode > ${{ github.workspace }}/secring.gpg

      - name: Inject credentials into Gradle properties
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties << EOF
          mavenCentralUsername=${{ secrets.MAVEN_CENTRAL_USERNAME }}
          mavenCentralPassword=${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          signing.keyId=${{ secrets.GPG_KEY_ID }}
          signing.password=${{ secrets.GPG_PASSWORD }}
          signing.secretKeyRingFile=${{ github.workspace }}/secring.gpg
          EOF

      - name: Run tests
        run: ./gradlew :lib:test

      - name: Publish to Maven Central
        run: ./gradlew :lib:publish

      - name: Cleanup GPG key
        if: always()
        run: rm -f ${{ github.workspace }}/secring.gpg